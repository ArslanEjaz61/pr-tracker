<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="8" fill="url(#grad)" />
  <!-- Dynamic sonar radar circles to represent tracking -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.2" />
  <circle cx="16" cy="16" r="10" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.2" />
  <!-- Bold PR typography centering the design -->
  <text x="16" y="20.5" font-family="'Inter', -apple-system, sans-serif" font-size="10.5" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="0.2">PR</text>
</svg>
